services:
  n8n-postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n
      - POSTGRES_DB=n8n
    volumes:
      - default_postgres_data:/var/lib/postgresql/data

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: playtheway-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_CORS_ALLOWED_ORIGINS=http://localhost:5173
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_ENCRYPTION_KEY=NI9rkth6wp7gY2eF76jXLPPDtUqVlBJf
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
    volumes:
      - default_n8n_data:/home/node/.n8n
    depends_on:
      - n8n-postgres

  frontend:
    build:
      context: ./frontend-app
    container_name: playtheway-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-app:/app
      - /app/node_modules
    environment:
      - VITE_N8N_WEBHOOK_URL=http://localhost:5678/webhook/playtheway

  memgraph:
    image: memgraph/memgraph-mage
    container_name: memgraph
    restart: unless-stopped
    ports:
      - "7687:7687"
      - "7444:7444"

volumes:
  default_n8n_data:
    external: true
  default_postgres_data:
    external: true
